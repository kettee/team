<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      width: 800px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: #000;
      color: white;
      padding: 20px 40px;
    }

    /* แต่ละ section */
    .section {
      padding: 40px;
      border-bottom: 1px solid #eee;
    }

    h1 { font-size: 28px; margin-bottom: 10px; }
    h2 { font-size: 22px; margin-bottom: 10px; }
    p  { line-height: 1.8; margin-bottom: 16px; }

    /* รูปภาพ */
    img {
      width: 100%;
      display: block;
      margin: 20px 0;
    }

    /* ลิงก์สีแดงแบบ zipevent */
    a {
      color: red;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>zipevent</h1>
  </div>

  <!-- Section 1 -->
  <div class="section">
    <h1>รวม 6 เว็บไซต์ออกแบบ ปี 2022</h1>
    <p>by Kanyawee Jin — March 3, 2022</p>
    <img src="banner.png"> <!-- ใส่รูปได้เลย -->
    <p>สำหรับสายกราฟิก นักออกแบบ รวมถึงมือใหม่ทั้งหลาย...</p>
  </div>

  <!-- Section 2 -->
  <div class="section">
    <h2>1. Pinterest</h2>
    <a href="https://www.pinterest.com">www.pinterest.com</a>
    <p>Pinterest เรียกว่าเป็นแหล่งรวมแรงบันดาลใจ...</p>
    <img src="pinterest.png">
  </div>

  <!-- เพิ่ม section ต่อไปเรื่อยๆ -->

</body>
</html>
